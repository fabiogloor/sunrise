<main>
    <style type="text/css" scoped="">
        body {
            background: var(--bs-gray-100);
        }
        /* HeaderSection → siehe index.html (shared styles) */
        /* Accepted-spezifisch: Header-Container mit border-radius */
        .header-container {
            position: relative;
            display: flex;
            width: 90%;
            max-width: 1280px;
            text-align: center;
            overflow: hidden;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border-radius: 14px;
        }
        .header-container-inner .text-container span {
            font-size: 24px;
            font-weight: 500;
            line-height: 110%;
        }

        .background-hover {
            background-color: #ffffff;
            border-radius: 16px;
            width: 90%;
            max-width: 1280px;
            height: auto;
            padding: 2rem;
            margin: 0 auto;
            color: var(--textColor);
        }
        .background-hover-cta {
            background-color: #ffffff;
            border-radius: 16px;
            width: 90%;
            max-width: 1280px;
            height: auto;
            padding: 14px 24px;
            margin: 0 auto;
            color: var(--textColor);
        }
        .background-hover-cta-inner{
            display: flex;
            flex-direction: column-reverse;
            align-items: stretch;
            gap: 2rem;
        }

    /* Header responsive → siehe index.html (shared styles) */
    /* slotaccepted-spezifische Overrides */
    @media (min-width: 600px) {
        .header-container .text-container {
            width: 60%;
            text-align: left;
            padding-left: 2rem;
        }
    }
    @media (min-width: 992px) {
        .l-center-l { max-width: var(--bs-breakpoint-lg); }
        .l-center-md { max-width: var(--bs-breakpoint-md); }
    }
    @media (min-width: 1200px) {
        .header-container-inner .text-container span {
            font-size: 48px;
            line-height: 110%;
        }
    }
    </style>
