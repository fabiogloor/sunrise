  /**
   * Prüft ob ein Wert nicht null, undefined, leer oder "null" ist.
   */
  function isNotNullOrEmpty(value) {
    return value !== null &&
           value !== undefined &&
           value !== "" &&
           (typeof value !== "string" || value.toLowerCase() !== "null");
  }

  /**
   * Schreibt einen Log-Eintrag in die OneClick-Log DataExtension.
   * @param {Object}  logData - Objekt mit den zu loggenden Daten.
   * @param {Boolean} debug   - Wenn true, wird eine Debug-Ausgabe geschrieben.
   */
  function logOneClick(logData, debug) {
    var logDE_Name = "ent.922_ONECLICKLOG";
    try {
      var logDE     = DataExtension.Init(logDE_Name);
      var addStatus = logDE.Rows.Add({
        "cicId":          logData.cicId,
        "siteId":         logData.siteId,
        "action":         logData.action,
        "products":       logData.products,
        "additionalInfo": Stringify(logData)
      });
      if (debug) {
        Write("Log: " + Stringify(logData) + " → Status: " + addStatus + "<br>");
      }
    } catch(e) {
      Write("Fehler beim Speichern des Logs: " + Stringify(e) + "<br>");
    }
  }
